<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Gradient Generator</title>
    <meta
      name="description"
      content="Create beautiful CSS linear and radial gradients with live preview, presets, color stops, and one-click copy."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero card glass">
        <div>
          <p class="eyebrow">CSS Gradient Generator</p>
          <h1>Design polished gradients and copy production-ready CSS.</h1>
          <p class="hero-copy">
            Build linear or radial gradients with adjustable angle, draggable-style stop controls,
            curated presets, and instant preview.
          </p>
        </div>
        <div class="hero-actions">
          <button id="randomizeBtn" class="btn btn-secondary">Randomize</button>
          <button id="copyBtn" class="btn btn-primary">Copy CSS</button>
        </div>
      </header>

      <main class="layout">
        <section class="controls card glass">
          <div class="section-title-row">
            <h2>Controls</h2>
            <span class="badge">Responsive</span>
          </div>

          <div class="control-group">
            <label for="gradientType">Gradient type</label>
            <div class="segmented" id="gradientType">
              <button class="segment active" data-type="linear">Linear</button>
              <button class="segment" data-type="radial">Radial</button>
            </div>
          </div>

          <div class="control-group" id="angleGroup">
            <div class="label-row">
              <label for="angleRange">Angle</label>
              <input id="angleNumber" type="number" min="0" max="360" value="90" />
            </div>
            <input id="angleRange" type="range" min="0" max="360" value="90" />
          </div>

          <div class="control-group">
            <div class="section-title-row compact">
              <label>Color stops</label>
              <button id="addStopBtn" class="btn btn-ghost btn-small">Add stop</button>
            </div>
            <div id="stopsList" class="stops-list"></div>
          </div>

          <div class="control-group">
            <div class="section-title-row compact">
              <label>Presets</label>
              <span class="muted">One tap to load</span>
            </div>
            <div id="presetGrid" class="preset-grid"></div>
          </div>
        </section>

        <section class="preview-column">
          <div class="preview card glass">
            <div class="section-title-row">
              <h2>Live preview</h2>
              <span id="copyStatus" class="status-pill">Ready</span>
            </div>
            <div id="previewSurface" class="preview-surface"></div>
          </div>

          <div class="code-panel card glass">
            <div class="section-title-row">
              <h2>Generated CSS</h2>
              <button id="copySecondaryBtn" class="btn btn-ghost btn-small">Copy</button>
            </div>
            <pre><code id="cssOutput"></code></pre>
          </div>
        </section>
      </main>
    </div>

    <template id="stopTemplate">
      <div class="stop-row">
        <input class="stop-color" type="color" />
        <div class="stop-position-wrap">
          <input class="stop-position-range" type="range" min="0" max="100" />
          <input class="stop-position-number" type="number" min="0" max="100" />
        </div>
        <button class="btn btn-ghost btn-small stop-remove" type="button">Remove</button>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
